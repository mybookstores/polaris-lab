<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>

  <!-- Dashboard layout -->
  <rect x="20" y="20" width="160" height="120" rx="8" fill="#0f0f23" stroke="#333" stroke-width="1"/>
  <text x="35" y="50" fill="#888" font-size="10">Detection Rate</text>
  <text x="35" y="90" fill="url(#grad2)" font-size="36" font-weight="bold">96.8%</text>
  <text x="35" y="115" fill="#10B981" font-size="10">↑ 2.5% from last month</text>

  <rect x="200" y="20" width="180" height="120" rx="8" fill="#0f0f23" stroke="#333" stroke-width="1"/>
  <text x="215" y="50" fill="#888" font-size="10">Active Bots Detected</text>
  <text x="215" y="90" fill="white" font-size="32" font-weight="bold">12,847</text>
  <rect x="215" y="105" width="100" height="4" rx="2" fill="#333"/>
  <rect x="215" y="105" width="75" height="4" rx="2" fill="url(#grad2)"/>

  <rect x="20" y="160" width="360" height="120" rx="8" fill="#0f0f23" stroke="#333" stroke-width="1"/>
  <text x="35" y="185" fill="#888" font-size="10">Recent Detections</text>

  <!-- Detection items -->
  <circle cx="45" cy="210" r="8" fill="#EF4444"/>
  <rect x="60" y="203" width="150" height="6" rx="3" fill="#444"/>
  <rect x="230" y="203" width="60" height="6" rx="3" fill="#EF4444" opacity="0.5"/>
  <text x="300" y="208" fill="#EF4444" font-size="8">Bot</text>

  <circle cx="45" cy="235" r="8" fill="#10B981"/>
  <rect x="60" y="228" width="120" height="6" rx="3" fill="#444"/>
  <rect x="200" y="228" width="80" height="6" rx="3" fill="#10B981" opacity="0.5"/>
  <text x="300" y="233" fill="#10B981" font-size="8">Human</text>

  <circle cx="45" cy="260" r="8" fill="#F59E0B"/>
  <rect x="60" y="253" width="180" height="6" rx="3" fill="#444"/>
  <rect x="260" y="253" width="50" height="6" rx="3" fill="#F59E0B" opacity="0.5"/>
  <text x="320" y="258" fill="#F59E0B" font-size="8">Uncertain</text>
</svg>