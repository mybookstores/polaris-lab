<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg-hero)"/>

  <!-- Neural network visualization -->
  <g opacity="0.3">
    <!-- Input layer -->
    <circle cx="50" cy="60" r="5" fill="#3B82F6"/>
    <circle cx="50" cy="100" r="5" fill="#3B82F6"/>
    <circle cx="50" cy="140" r="5" fill="#3B82F6"/>

    <!-- Hidden layer 1 -->
    <circle cx="120" cy="50" r="5" fill="#8B5CF6"/>
    <circle cx="120" cy="90" r="5" fill="#8B5CF6"/>
    <circle cx="120" cy="130" r="5" fill="#8B5CF6"/>
    <circle cx="120" cy="170" r="5" fill="#8B5CF6"/>

    <!-- Hidden layer 2 -->
    <circle cx="200" cy="70" r="5" fill="#10B981"/>
    <circle cx="200" cy="120" r="5" fill="#10B981"/>
    <circle cx="200" cy="160" r="5" fill="#10B981"/>

    <!-- Output layer -->
    <circle cx="280" cy="100" r="5" fill="#F59E0B"/>
    <circle cx="280" cy="140" r="5" fill="#F59E0B"/>

    <!-- Connections -->
    <g stroke="#333" stroke-width="0.5">
      <!-- Input to hidden1 -->
      <line x1="55" y1="60" x2="115" y2="50"/>
      <line x1="55" y1="60" x2="115" y2="90"/>
      <line x1="55" y1="100" x2="115" y2="50"/>
      <line x1="55" y1="100" x2="115" y2="90"/>
      <line x1="55" y1="100" x2="115" y2="130"/>
      <line x1="55" y1="140" x2="115" y2="130"/>
      <line x1="55" y1="140" x2="115" y2="170"/>

      <!-- hidden1 to hidden2 -->
      <line x1="125" y1="50" x2="195" y2="70"/>
      <line x1="125" y1="90" x2="195" y2="70"/>
      <line x1="125" y1="90" x2="195" y2="120"/>
      <line x1="125" y1="130" x2="195" y2="120"/>
      <line x1="125" y1="130" x2="195" y2="160"/>
      <line x1="125" y1="170" x2="195" y2="160"/>

      <!-- hidden2 to output -->
      <line x1="205" y1="70" x2="275" y2="100"/>
      <line x1="205" y1="70" x2="275" y2="140"/>
      <line x1="205" y1="120" x2="275" y2="100"/>
      <line x1="205" y1="120" x2="275" y2="140"/>
      <line x1="205" y1="160" x2="275" y2="140"/>
    </g>
  </g>

  <!-- Data points -->
  <g fill="#3B82F6" opacity="0.6">
    <circle cx="320" cy="50" r="2"/>
    <circle cx="340" cy="70" r="2"/>
    <circle cx="350" cy="90" r="2"/>
    <circle cx="330" cy="110" r="2"/>
    <circle cx="360" cy="130" r="2"/>
    <circle cx="340" cy="150" r="2"/>
  </g>

  <!-- Grid overlay -->
  <g stroke="#222" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
  </g>
</svg>