<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)"/>

  <!-- 3D Crystal structure -->
  <g transform="translate(200, 150)">
    <!-- Atom spheres -->
    <circle cx="0" cy="0" r="15" fill="#3B82F6" opacity="0.9"/>
    <circle cx="-40" cy="-20" r="10" fill="#8B5CF6" opacity="0.9"/>
    <circle cx="40" cy="-20" r="10" fill="#10B981" opacity="0.9"/>
    <circle cx="-30" cy="30" r="12" fill="#F59E0B" opacity="0.9"/>
    <circle cx="30" cy="30" r="12" fill="#EC4899" opacity="0.9"/>
    <circle cx="0" cy="-50" r="8" fill="#06B6D4" opacity="0.9"/>
    <circle cx="-50" cy="10" r="8" fill="#84CC16" opacity="0.9"/>
    <circle cx="50" cy="10" r="8" fill="#F97316" opacity="0.9"/>

    <!-- Bonds -->
    <line x1="0" y1="0" x2="-40" y2="-20" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="-20" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-30" y2="30" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="30" y2="30" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="-40" y1="-20" x2="0" y2="-50" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="-20" x2="0" y2="-50" stroke="#fff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Info panel -->
  <rect x="20" y="20" width="150" height="80" rx="8" fill="#0f0f23" stroke="#333" stroke-width="1"/>
  <text x="35" y="45" fill="#888" font-size="9">Material</text>
  <text x="35" y="65" fill="white" font-size="14" font-weight="bold">Graphene</text>
  <text x="35" y="85" fill="#3B82F6" font-size="10">Band gap: 0 eV</text>

 <rect x="230" y="20" width="150" height="80" rx="8" fill="#0f0f23" stroke="#333" stroke-width="1"/>
  <text x="245" y="45" fill="#888" font-size="9">Predicted Properties</text>
  <text x="245" y="65" fill="white" font-size="12">Conductivity: 10^6 S/m</text>
  <text x="245" y="85" fill="#10B981" font-size="10">Stability: High</text>

  <!-- Property chart -->
  <rect x="20" y="220" width="360" height="60" rx="8" fill="#0f0f23" stroke="#333" stroke-width="1"/>
  <text x="35" y="240" fill="#888" font-size="9">Property Distribution</text>
  <rect x="35" y="250" width="330" height="8" rx="4" fill="#222"/>
  <rect x="35" y="250" width="100" height="8" rx="4" fill="url(#grad3)"/>
  <rect x="140" y="250" width="80" height="8" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="225" y="250" width="50" height="8" rx="4" fill="#F59E0B" opacity="0.6"/>
</svg>